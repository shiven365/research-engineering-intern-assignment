services:
  - type: web
    name: narrativeradar-streamlit
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATA_PATH
        value: ./backend/data.jsonl
      - key: DB_PATH
        value: ./narrativescope.db
      - key: INDEX_PATH
        value: ./embeddings.index
      - key: ID_MAP_PATH
        value: ./id_map.pkl
      - key: ANTHROPIC_API_KEY
        sync: false
